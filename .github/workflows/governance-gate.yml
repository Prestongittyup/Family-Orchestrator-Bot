name: governance-gate

# Legacy gate references retained for governance drift tests:
# tests/test_hard_freeze_regression.py
# tests/test_governance_gates.py
# tests/test_layer_redundancy_guard.py
# tests/test_ui_canonical_wiring_guard.py

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  governance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enforce runtime contract guard
        run: |
          python scripts/contract_guard.py

      - name: Enforce architecture layer guard
        run: |
          python scripts/architecture_layer_guard.py

      - name: Enforce decision-card shadow detector
        run: |
          python scripts/decision_card_shadow_detector.py

      - name: Enforce decision-card dependency graph guard
        run: |
          python scripts/decision_card_dependency_graph_guard.py

      - name: Enforce architecture validator (blocking)
        run: |
          python scripts/ci/architecture_validator.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run CI gate tier (blocking)
        run: |
          pytest -m "ci_gate" -q

      - name: Run migration tier (non-blocking)
        continue-on-error: true
        run: |
          mkdir -p test_reports
          pytest -m "migration" -q --junitxml=test_reports/migration-tier-junit.xml

      - name: Upload migration tier report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-tier-junit
          path: test_reports/migration-tier-junit.xml
          if-no-files-found: warn
