services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.intelligence
    container_name: household-intelligence-backend
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: household-intelligence-redis
    ports:
      - "6379:6379"
