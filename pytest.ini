[pytest]
# HPAL Household Simulation & Failure Injection Test Harness Configuration

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: fast deterministic tests with no IO
    integration: API + DB interaction tests
    system: full-stack bounded correctness tests
    ci_gate: RFC-001 KEEP tier tests that must pass in blocking CI
    migration: RFC-001 MODIFY tier tests for non-blocking migration convergence tracking
    reliability: RFC-001 RISK tier tests for scheduled/manual reliability sweeps
    chaos: stress tests, concurrency storms, replay/reconnect torture tests
    legacy: outdated or pre-architecture refactor tests
    flaky: unstable timing-sensitive tests
    asyncio: mark test as async (requires pytest-asyncio)
    timeout: override per-test timeout budget for long-running stress tests
    invariant: test for invariant validator (critical constraints)
    failure: test for failure injection and resilience
    replay: test for deterministic replay and convergence
    matrix: test for comprehensive test matrix execution
    slow: test that takes significant time
    sanity: quick sanity check tests

asyncio_mode = auto

# Test output options
addopts =
    -m "not chaos"
    -v
    --strict-markers
    --tb=short
    --capture=no

# Timeout for tests (seconds)
timeout = 300

# Minimum Python version
minversion = 3.8

# Test paths
testpaths = tests
norecursedirs = tests/legacy/to_be_removed

# Log level
log_cli = true
log_cli_level = INFO
